<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이리스 형태학 시뮬레이션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .animate-spin-slow { animation: spin 3s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo } = React;
    // 전역 lucide 객체에서 아이콘 생성
    const { Compass, Layers, Sliders } = lucide;

    const IRIS_SPECIES_DATA = {
      setosa: { name: 'Iris setosa', koreanName: '부채붓꽃 (Setosa)', sepalLength: 5.01, sepalWidth: 3.43, petalLength: 1.46, petalWidth: 0.24, color: '#a855f7', bgGradient: 'from-purple-500/20 to-indigo-500/10', description: '꽃잎이 매우 작고 흔적만 남아 있는 반면, 꽃받침이 상대적으로 넓고 둥근 것이 가장 큰 특징입니다.', origin: '북미, 동아시아 북부' },
      versicolor: { name: 'Iris versicolor', koreanName: '풍선붓꽃 (Versicolor)', sepalLength: 5.94, sepalWidth: 2.77, petalLength: 4.26, petalWidth: 1.33, color: '#06b6d4', bgGradient: 'from-cyan-500/20 to-blue-500/10', description: '세토사와 버지니카의 중간 크기 형태를 가지며, 화려한 보라색과 푸른색의 그라데이션이 조화를 이룹니다.', origin: '북아메리카 동부' },
      virginica: { name: 'Iris virginica', koreanName: '버지니아붓꽃 (Virginica)', sepalLength: 6.59, sepalWidth: 2.97, petalLength: 5.55, petalWidth: 2.03, color: '#10b981', bgGradient: 'from-emerald-500/20 to-teal-500/10', description: '가장 거대한 크기를 자랑하며, 꽃잎과 꽃받침이 넓고 길게 발달합니다.', origin: '북아메리카 동남부' }
    };

    const SLIDER_LIMITS = {
      sepalLength: { min: 4.0, max: 8.0, step: 0.1, label: '꽃받침 길이' },
      sepalWidth: { min: 2.0, max: 4.5, step: 0.1, label: '꽃받침 너비' },
      petalLength: { min: 1.0, max: 7.0, step: 0.1, label: '꽃잎 길이' },
      petalWidth: { min: 0.1, max: 2.5, step: 0.1, label: '꽃잎 너비' }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('simulation');
      const [sliderValues, setSliderValues] = useState({ sepalLength: 5.8, sepalWidth: 3.0, petalLength: 3.8, petalWidth: 1.2 });
      
      const prediction = useMemo(() => {
        let minDistance = Infinity;
        let nearestKey = 'setosa';
        Object.entries(IRIS_SPECIES_DATA).forEach(([key, species]) => {
          const dist = Math.sqrt(Math.pow(sliderValues.sepalLength - species.sepalLength, 2) + Math.pow(sliderValues.sepalWidth - species.sepalWidth, 2) + Math.pow(sliderValues.petalLength - species.petalLength, 2) + Math.pow(sliderValues.petalWidth - species.petalWidth, 2));
          if (dist < minDistance) { minDistance = dist; nearestKey = key; }
        });
        const confidence = Math.max(10, Math.min(99, Math.round((1 - (minDistance / 6.0)) * 100)));
        return { species: IRIS_SPECIES_DATA[nearestKey], confidence };
      }, [sliderValues]);

      return (
        <div className="min-h-screen bg-[#0d0f14] text-gray-100 flex flex-col font-sans">
          <header className="sticky top-0 bg-[#0d0f14]/80 backdrop-blur-md border-b border-gray-800 p-4 flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-purple-600 to-emerald-500 flex items-center justify-center">
                <Compass className="w-5 h-5 text-white" />
              </div>
              <h1 className="text-base font-bold">Iris Morphology</h1>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-24">
            {activeTab === 'simulation' ? (
              <div className="max-w-lg mx-auto space-y-4">
                <div className="relative rounded-2xl bg-gray-900 border border-gray-800 p-6 flex flex-col items-center justify-center aspect-square">
                  <div className="w-48 h-48 rounded-full border-4 border-dashed border-gray-700 animate-spin-slow flex items-center justify-center">
                    <div className="w-16 h-16 rounded-full" style={{ backgroundColor: prediction.species.color }}></div>
                  </div>
                </div>
                <div className="bg-gray-900/60 p-4 rounded-2xl">
                  <h3 className="font-bold text-sm mb-2">분류 결과: {prediction.species.koreanName}</h3>
                  <div className="text-emerald-400 text-lg font-bold">유사도: {prediction.confidence}%</div>
                </div>
                <div className="bg-gray-900/40 p-4 rounded-2xl space-y-4">
                  {Object.entries(SLIDER_LIMITS).map(([key, config]) => (
                    <div key={key}>
                      <div className="flex justify-between text-xs mb-1">
                        <span>{config.label}</span>
                        <span>{sliderValues[key].toFixed(1)} cm</span>
                      </div>
                      <input type="range" min={config.min} max={config.max} step={config.step} value={sliderValues[key]} onChange={(e) => setSliderValues(prev => ({...prev, [key]: parseFloat(e.target.value)}))} className="w-full h-1 bg-gray-700 accent-purple-500 rounded-lg cursor-pointer" />
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="max-w-lg mx-auto space-y-4">
                {Object.entries(IRIS_SPECIES_DATA).map(([key, item]) => (
                  <div key={key} className={`p-4 rounded-xl border border-gray-800 bg-gradient-to-b ${item.bgGradient}`}>
                    <h4 className="font-bold text-sm">{item.koreanName}</h4>
                    <p className="text-xs text-gray-300 mt-2">{item.description}</p>
                  </div>
                ))}
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-[#0d0f14]/90 border-t border-gray-800 p-2 flex justify-around">
            <button onClick={() => setActiveTab('simulation')} className={`text-xs ${activeTab === 'simulation' ? 'text-purple-400' : 'text-gray-500'}`}><Sliders className="w-6 h-6 mx-auto mb-1"/>시뮬레이션</button>
            <button onClick={() => setActiveTab('insight')} className={`text-xs ${activeTab === 'insight' ? 'text-purple-400' : 'text-gray-500'}`}><Layers className="w-6 h-6 mx-auto mb-1"/>사전 정보</button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
